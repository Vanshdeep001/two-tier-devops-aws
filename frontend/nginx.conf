# frontend/nginx.conf
# Nginx config used INSIDE the frontend container. Nginx does two jobs here:
#   1. Serve the static React build (HTML/CSS/JS) fast.
#   2. Proxy any /api/* request to the backend Service, so the browser only ever
#      talks to one origin (no CORS headaches, and the backend stays private).

server {
  listen 80;
  server_name _;

  # Where the compiled React files live (copied in by the Dockerfile).
  root /usr/share/nginx/html;
  index index.html;

  # Serve static files. If a file/dir is not found, fall back to index.html.
  # This "try_files ... /index.html" line is what makes client-side routing work
  # (refreshing /some/route still loads the React app instead of 404ing).
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse proxy: forward /api/... to the backend.
  # BACKEND_URL is substituted at container start (see docker-entrypoint below in
  # the Dockerfile notes). In Kubernetes this is the backend Service DNS name,
  # e.g. http://backend-service:5000
  location /api/ {
    proxy_pass ${BACKEND_URL}/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # A lightweight health endpoint for the frontend container's own probes.
  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }
}
