<!DOCTYPE html>
<!--
  public/index.html
  The single HTML page that React mounts into. Create React App injects the
  built JS/CSS bundle references here at build time. The whole app renders into
  the <div id="root"> below.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Two-Tier DevOps demo frontend" />
    <title>Two-Tier DevOps Demo</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- React attaches the entire UI to this element. -->
    <div id="root"></div>
  </body>
</html>
