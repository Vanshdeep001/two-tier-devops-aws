# secret.yaml
# A Secret holds SENSITIVE data (API keys, DB passwords). It looks like a
# ConfigMap but is meant for confidential values. NOTE: by default Kubernetes
# Secrets are only base64-ENCODED, not encrypted — base64 is NOT security.
# Real protection comes from RBAC (who can read them) + enabling encryption at
# rest, or an external manager (AWS Secrets Manager, Sealed Secrets, Vault).
#
# This file is a DEMO placeholder. The value below is fake. In a real repo you
# would NOT commit real secrets — you'd create them via CI or a secrets manager.

apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: two-tier
type: Opaque
# stringData lets you write plain text; Kubernetes base64-encodes it for you.
stringData:
  # Placeholder for a future MongoDB connection string. Unused today.
  DB_CONNECTION_STRING: "mongodb://user:changeme@mongo:27017/app"
