# frontend-service.yaml
# The frontend must be reachable from the internet. We use a NodePort Service.
#
# Why NodePort (and not LoadBalancer) for AWS Free Tier?
#   - type: LoadBalancer on AWS makes the cloud provider spin up a real ELB/NLB.
#     That is a paid resource (NOT Free Tier) and needs a cloud controller.
#   - type: NodePort opens a fixed port (30000-32767) on the node's own IP. It
#     costs nothing extra — you reach the app at http://<node-public-ip>:30080.
#   - Our Security Group already opens that port. Perfect for a single-node k3s
#     Free-Tier setup.
# In real production with EKS you'd use LoadBalancer (or an Ingress + ALB).

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: two-tier
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80          # Service port inside the cluster
      targetPort: 80    # container port
      nodePort: 30080   # the external port on the node (matches Terraform SG)
