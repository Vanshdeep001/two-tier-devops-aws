# configmap.yaml
# A ConfigMap holds NON-secret configuration as key/value pairs. It lets you
# change app settings without rebuilding the image. Pods read these values as
# environment variables (see the deployments). Use ConfigMaps for anything that
# is not sensitive; use Secrets for passwords/tokens.

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: two-tier
data:
  # Consumed by the backend container.
  MESSAGE: "Hello from Kubernetes (backend via ConfigMap)!"
  CORS_ORIGIN: "*"
  PORT: "5000"
  # Consumed by the frontend/Nginx container: where to proxy /api.
  # This is the in-cluster DNS name of the backend Service.
  BACKEND_URL: "http://backend-service:5000"
